<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星露谷·极致视觉送礼助手</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="送礼助手">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --bg-deep: #1c140d;
            --bg-card: #271e16;
            --accent-gold: #dcb375;
            --text-main: #b89f81;
            --text-sub: #8d7963;
            --border-color: #433324;
            --sidebar-width: 340px;
        }

        body {
            font-family: 'PingFang SC', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* 左侧：居民图鉴区 */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
            background: radial-gradient(circle at top left, #231a12 0%, #1c140d 100%);
        }

        .content-area h2 {
            color: var(--accent-gold);
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: normal;
            letter-spacing: 3px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .npc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 25px;
        }

        .npc-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .npc-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .npc-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #33271b;
            margin-bottom: 10px;
        }

        /* 右侧：侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: #2a2016;
            border-left: 1px solid var(--accent-gold);
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0, 0, 0, 0.5);
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid var(--border-color);
            background: #32261b;
        }

        .sidebar-header h4 {
            margin: 0 0 15px 0;
            color: var(--accent-gold);
            text-align: center;
            letter-spacing: 2px;
        }

        .header-btn-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-new-day {
            flex: 1;
            padding: 10px;
            background: var(--accent-gold);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            color: #1c140d;
            font-size: 13px;
        }

        .btn-bag {
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--accent-gold);
            border-radius: 8px;
            cursor: pointer;
            color: var(--accent-gold);
            font-size: 18px;
            line-height: 1;
            transition: background 0.2s;
            position: relative;
        }

        .btn-bag:hover {
            background: rgba(220, 179, 117, 0.15);
        }

        .mission-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-content: start;
        }

        .mission-item {
            background: var(--bg-deep);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mission-item.completed {
            opacity: 0.1;
            filter: grayscale(1);
        }

        .npc-mini-line {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            width: 100%;
            border-bottom: 1px solid #3d2e21;
            padding-bottom: 6px;
        }

        .npc-mini {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid var(--accent-gold);
        }

        .gift-display {
            text-align: center;
            padding: 5px 0;
        }

        .gift-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .gift-name {
            font-size: 11px;
            color: #fff;
            display: block;
            min-height: 26px;
        }

        .gift-points {
            font-size: 10px;
            color: #ff6b6b;
            font-weight: bold;
        }

        .side-btn-group {
            display: flex;
            gap: 5px;
            width: 100%;
            margin-top: 10px;
        }

        .side-btn-group button {
            font-size: 11px;
            padding: 6px 0;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid var(--accent-gold);
            flex: 1;
        }

        .btn-rot {
            background: transparent;
            color: var(--accent-gold);
        }

        .btn-ok {
            background: var(--accent-gold);
            color: #1c140d;
            font-weight: bold;
        }

        /* 手机端收起逻辑 */
        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: var(--accent-gold);
            color: #1c140d;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                right: 0;
                top: 0;
                height: 100%;
                transform: translateX(100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: block;
            }
        }

        /* 弹窗：居民详情 */
        #detailsOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .detail-card {
            background: var(--bg-deep);
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            color: var(--accent-gold);
            font-size: 32px;
            cursor: pointer;
        }

        .gift-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 12px;
            margin: 15px 0 30px;
        }

        .gift-box {
            background: var(--bg-card);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 11px;
            border: 1px solid #444;
        }

        .gift-box img {
            width: 30px;
            height: 30px;
            margin-bottom: 8px;
        }

        /* ========== 背包清单弹窗 ========== */
        #bagOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 200;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .bag-card {
            background: var(--bg-deep);
            border: 1px solid var(--accent-gold);
            border-radius: 20px;
            max-width: 560px;
            margin: 40px auto;
            padding: 30px;
            position: relative;
        }

        .bag-card .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
        }

        .bag-title {
            color: var(--accent-gold);
            font-size: 18px;
            letter-spacing: 3px;
            margin: 0 0 6px 0;
        }

        .bag-subtitle {
            color: var(--text-sub);
            font-size: 12px;
            margin-bottom: 24px;
        }

        .bag-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #271e16;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .bag-progress-bar-wrap {
            flex: 1;
            height: 6px;
            background: #433324;
            border-radius: 3px;
            overflow: hidden;
        }

        .bag-progress-bar {
            height: 100%;
            background: var(--accent-gold);
            border-radius: 3px;
            transition: width 0.4s ease;
        }

        .bag-progress-text {
            font-size: 12px;
            color: var(--accent-gold);
            white-space: nowrap;
        }

        .bag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .bag-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .bag-item:hover {
            border-color: var(--accent-gold);
            background: #2f2419;
        }

        .bag-item.checked {
            opacity: 0.35;
            filter: grayscale(0.7);
        }

        .bag-item.checked::after {
            content: '✓';
            position: absolute;
            top: 6px;
            right: 8px;
            color: #6dbf67;
            font-size: 13px;
            font-weight: bold;
        }

        .bag-item-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .bag-item-info {
            flex: 1;
            min-width: 0;
        }

        .bag-item-name {
            font-size: 12px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bag-item-count {
            display: inline-block;
            background: var(--accent-gold);
            color: #1c140d;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 6px;
            border-radius: 10px;
            margin-bottom: 4px;
        }

        .bag-item-npcs {
            font-size: 10px;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bag-check-hint {
            text-align: center;
            color: var(--text-sub);
            font-size: 11px;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid var(--border-color);
        }

        .bag-check-all-btn {
            margin-top: 14px;
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .bag-check-all-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
    </style>
</head>

            { id: "Sebastian", name: "塞巴斯蒂安", loves: ["青蛙蛋", "泪晶", "黑曜石", "南瓜汤", "生鱼片", "虚空蛋"], likes: ["战斗季刊", "比目鱼", "怪物图鉴", "石英"], done: false },
            { id: "Shane", name: "谢恩", loves: ["啤酒", "辣椒", "爆炒青椒", "披萨"], likes: ["所有蛋(除虚空蛋)", "所有水果"], done: false },
            { id: "Vincent", name: "文森特", loves: ["蔓越莓糖果", "青蛙蛋", "姜汁汽水", "葡萄", "粉红蛋糕", "蜗牛"], likes: ["椰子", "黄水仙"], done: false },
            { id: "Willy", name: "威利", loves: ["鲶鱼", "钻石", "金锭", "铱锭", "海之宝石", "蜜蜂酒", "章鱼", "南瓜", "海参", "鲟鱼", "捕蟹秘籍"], likes: ["鱼饵和浮漂", "虎纹鳟鱼"], done: false },
            { id: "Wizard", name: "法师", loves: ["谜之书", "紫蘑菇", "太阳精华", "虚空精华", "大海参"], likes: ["铱锭", "石英", "所有晶球矿物"], done: false }
        ];

        // 背包清单勾选状态（按礼物名称存储）
        const bagChecks = {};

        function getFullLoves(npc) {
            let list = [...npc.loves];
            universalLoves.forEach(u => { if (!npc.noUniversal || !npc.noUniversal.includes(u)) list.push(u); });
            return list;
        }

        function getIcon(name) { return `<img src="gifts/${name}.png" class="gift-icon" onerror="this.src='https://via.placeholder.com/32/2a2016/dcb375?text=?';">`; }

        function refreshUI() { renderMissions(); renderGrid(); }

        function renderGrid() {
            document.getElementById('npcGrid').innerHTML = npcData.map(n => `
                <div class="npc-card" onclick="openDetails('${n.id}')">
                    <img src="portraits/${n.id}.png" onerror="this.src='https://via.placeholder.com/80/433324/dcb375?text=${n.name[0]}'">
                    <div class="npc-name">${n.name}</div>
                </div>
            `).join('');
        }

        function renderMissions() {
            document.getElementById('missionList').innerHTML = npcData.map(n => `
                <div class="mission-item ${n.done ? 'completed' : ''}">
                    <div class="npc-mini-line">
                        <img src="portraits/${n.id}.png" class="npc-mini">
                        <span class="npc-mini-name">${n.name}</span>
                    </div>
                    <div class="gift-display">
                        ${getIcon(n.currentGift)}
                        <span class="gift-name">${n.currentGift}</span>
                        <span class="gift-points">${n.isLove ? '+80' : '+45'}</span>
                    </div>
                    <div class="side-btn-group">
                        <button class="btn-rot" onclick="rotate('${n.id}')">换</button>
                        <button class="btn-ok" onclick="toggle('${n.id}')">${n.done ? '✓' : '送'}</button>
                    </div>
                </div>
            `).join('');
        }

        function generateAllRandom() {
            npcData.forEach(n => {
                const loves = getFullLoves(n);
                n.currentGift = loves[0];
                n.isLove = true;
                n.done = false;
            });
            // 重置背包勾选
            Object.keys(bagChecks).forEach(k => delete bagChecks[k]);
            refreshUI();
        }

        window.rotate = (id) => {
            const n = npcData.find(x => x.id === id);
            const loves = getFullLoves(n);
            const likes = n.likes || [];
            const combined = [...loves, ...likes];
            let currentIdx = combined.indexOf(n.currentGift);
            let nextIdx = (currentIdx + 1) % combined.length;
            n.currentGift = combined[nextIdx];
            n.isLove = loves.includes(n.currentGift);
            refreshUI();
        }

        window.toggle = (id) => {
            const n = npcData.find(x => x.id === id);
            n.done = !n.done;
            refreshUI();
        }

        window.toggleSidebar = () => document.querySelector('.sidebar').classList.toggle('active');

        // ========== 背包清单逻辑 ==========

        function buildBagSummary() {
            // 汇总：giftName -> { count, npcs: [{name, isLove}] }
            const map = {};
            npcData.forEach(n => {
                const gift = n.currentGift;
                if (!gift) return;
                if (!map[gift]) map[gift] = { count: 0, npcs: [] };
                map[gift].count += 1;
                map[gift].npcs.push({ name: n.name, isLove: n.isLove });
            });
            // 按数量降序排列
            return Object.entries(map).sort((a, b) => b[1].count - a[1].count);
        }

        window.openBag = () => {
            const summary = buildBagSummary();
            const totalKinds = summary.length;
            const totalNpcs = npcData.length;

            document.getElementById('bagTotalKinds').textContent = totalKinds;
            document.getElementById('bagTotalNpcs').textContent = totalNpcs;

            renderBagGrid(summary);
            updateBagProgress(summary);

            document.getElementById('bagOverlay').style.display = 'block';
        }

        function renderBagGrid(summary) {
            if (!summary) summary = buildBagSummary();

            document.getElementById('bagGrid').innerHTML = summary.map(([giftName, info]) => {
                const isChecked = !!bagChecks[giftName];
                const npcStr = info.npcs.map(n => n.name).join('、');
                return `
                    <div class="bag-item ${isChecked ? 'checked' : ''}" onclick="toggleBagCheck('${giftName}')">
                        <img src="gifts/${giftName}.png" class="bag-item-icon"
                             onerror="this.src='https://via.placeholder.com/36/2a2016/dcb375?text=?'">
                        <div class="bag-item-info">
                            <div class="bag-item-name">${giftName}</div>
                            <span class="bag-item-count">× ${info.count}</span>
                            <div class="bag-item-npcs">→ ${npcStr}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateBagProgress(summary) {
            if (!summary) summary = buildBagSummary();
            const total = summary.length;
            const checked = summary.filter(([name]) => !!bagChecks[name]).length;
            const pct = total > 0 ? Math.round(checked / total * 100) : 0;
            document.getElementById('bagProgressBar').style.width = pct + '%';
            document.getElementById('bagProgressText').textContent = `${checked} / ${total}`;
        }

        window.toggleBagCheck = (giftName) => {
            bagChecks[giftName] = !bagChecks[giftName];
            const summary = buildBagSummary();
            renderBagGrid(summary);
            updateBagProgress(summary);
        }

        window.resetBagChecks = () => {
            Object.keys(bagChecks).forEach(k => delete bagChecks[k]);
            const summary = buildBagSummary();
            renderBagGrid(summary);
            updateBagProgress(summary);
        }

        window.closeBag = () => document.getElementById('bagOverlay').style.display = 'none';

        // ========== 居民详情弹窗 ==========

        window.openDetails = (id) => {
            const n = npcData.find(x => x.id === id);
            const loves = getFullLoves(n);
            document.getElementById('detailContent').innerHTML = `
                <h3 style="color:var(--accent-gold);margin-top:0;">${n.name}</h3>
                <div style="color:#ff6b6b; font-size:14px; margin-top:20px;">💖 最爱 (+80)</div>
                <div class="gift-row">${loves.map(g => `<div class="gift-box">${getIcon(g)}<div>${g}</div></div>`).join('')}</div>
                <div style="color:#ffd93d; font-size:14px;">😊 喜欢 (+45)</div>
                <div class="gift-row">${n.likes.map(g => `<div class="gift-box">${getIcon(g)}<div>${g}</div></div>`).join('')}</div>
            `;
            document.getElementById('detailsOverlay').style.display = 'block';
        }

        window.closeDetails = () => document.getElementById('detailsOverlay').style.display = 'none';

        generateAllRandom();
    </script>
</body>

</html>
